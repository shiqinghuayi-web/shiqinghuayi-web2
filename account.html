<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拾情畫憶｜會員中心</title>
  <link rel="icon" href="client/assets/images/111.png" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="client/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-wrap">
      <a class="brand logo-brand" href="index.html">
        <img src="client/assets/images/piyan.png" alt="拾情話憶 Logo" height="40">
      </a>
      <nav class="main-nav">
        <a href="index.html">首頁</a>
        <a href="products.html">商品</a>
        <a href="cart.html">購物車 <span id="cart-count" class="cart-badge">0</span></a>
        <a href="login.html" class="nav-auth-btn">登入</a>
        <a href="account.html" class="active">會員中心</a>
      </nav>
    </div>
  </header>

  <main class="section page-top">
    <div class="container">
      <section class="page-hero">
        <span class="eyebrow">Account Center</span>
        <h1>會員中心</h1>
      </section>

      <div class="account-layout">
        <aside class="account-sidebar">
          <h3 style="margin:0 0 4px;font-family:var(--font-display);font-size:34px;color:var(--primary-strong)">會員功能</h3>
          <a class="account-link active" href="#">個人資料</a>
          <a class="account-link" href="#">我的訂單</a>
          <a class="account-link" href="cart.html">購物車</a>
          <a class="account-link" href="#" id="sidebar-logout-btn" style="color: #d9534f; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">登出帳號</a>
        </aside>

        <section class="account-content">
          <div class="panel-card">
            <h2>個人資料</h2>
            <div id="member-profile" class="profile-grid">
              <p>資料載入中...</p>
            </div>
          </div>

          <div class="panel-card">
            <h2>訂單紀錄</h2>
            <div id="order-list" class="order-list">
              <p style="color: #888;">目前尚沒有訂單資料。</p>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <a class="brand logo-brand footer-logo" href="index.html">
          <img src="client/assets/images/piyan2.png" alt="拾情話憶 Logo">
        </a>
      </div>
      <div>
        <h4>網站導覽</h4>
        <a href="products.html">商品列表</a>
        <a href="cart.html">購物車</a>
        <a href="account.html">會員中心</a>
      </div>
    </div>
  </footer>
  
  <script src="client/js/config.js"></script>
  <script src="client/js/account.js"></script>
</body>
</html>
