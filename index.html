<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拾情話憶｜首頁</title>
  <link rel="icon" href="client/assets/images/111.png" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="client/css/style.css" />
</head>
<body>

  <header class="site-header hero-header">
    <div class="header-wrap header-full">
      <a class="brand logo-brand" href="index.html">
        <img src="client/assets/images/piyan2.png" alt="拾情話憶 Logo">
      </a>
      <nav class="main-nav">
        <a href="index.html" class="active">首頁</a>
        <a href="products.html">商品</a>
        <a href="cart.html">購物車 <span id="cart-count" class="cart-badge">0</span></a>
        <a href="login.html">登入</a>
        <a href="account.html">會員中心</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-video-section">
      <div class="hero-media">
        <video class="hero-video" autoplay muted loop playsinline>
          <source src="client/assets/videos/green.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
      </div>
      <div class="container hero-inner">
        <div class="hero-content">
          <span class="eyebrow">Tasteful Living Selection</span>
          <h1>拾起日常</h1>
          <p>以溫潤米黃與苔綠為主調，打造沉浸式的品茶體驗。</p>
          <div class="hero-actions">
            <a class="btn" href="products.html">探索選物</a>
            <a class="btn btn-light" href="#brand-story">閱讀故事</a>
          </div>
        </div>
      </div>
    </section>

    <section id="brand-story" class="section dark-section">
      <div class="container two-col">
        <div class="glass-card brand-story-card">
          <span class="section-label">Brand Story</span>
          <h2 class="brand-story-title">撿拾情感中的話語與記憶</h2>
          <p class="muted">傳達人與人之間的情感流動，那些說不出口的心意，被時間輕輕保存下來。</p>
        </div>
        <div class="story-stack">
          <div class="info-card"><h3>拾情話憶</h3><p class="muted">收集細碎卻真實的情感片段。</p></div>
          <div class="info-card"><h3>核心精神</h3><p class="muted">在快速流動的世界裡，聽見內心的聲音。</p></div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-head">
          <div>
            <span class="section-label">Curated Selection</span>
            <h2>精選商品</h2>
          </div>
          <a class="text-link" href="products.html">查看全部商品</a>
        </div>
        <div id="featured-products" class="product-grid"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <a class="brand logo-brand footer-logo" href="index.html">
        <img src="client/assets/images/piyan2.png" alt="拾情話憶 Logo">
      </a>
      <div>
        <h4>網站導覽</h4>
        <a href="products.html">商品列表</a>
        <a href="cart.html">購物車</a>
        <a href="account.html">會員中心</a>
      </div>
    </div>
  </footer>

  <script src="client/js/mockProductsFrontend.js"></script>
  <script src="client/js/main.js"></script>
</body>
</html>
